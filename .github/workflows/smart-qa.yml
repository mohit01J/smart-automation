name: SMART-QA Automated Test Run

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  smart-qa-smoke:
    name: Smoke Tests on BrowserStack
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Verify Playwright installation
        run: npx playwright --version

      - name: Run smoke tests on BrowserStack
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        run: npm run test:bs:smoke

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smart-qa-results-${{ github.run_number }}
          path: |
            test-results/
            playwright-report/
          retention-days: 30

      - name: Save run summary to QA foundation repo
        if: always()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          JOB_STATUS: ${{ job.status }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          RUN_NUMBER=${{ github.run_number }}
          RUN_ID=${{ github.run_id }}
          ACTOR=${{ github.actor }}
          TRIGGER=${{ github.event_name }}
          REPO=${{ github.repository }}

          CONTENT="run_id: ${DATE}-smoke-gh-${RUN_NUMBER}
          suite: smoke
          trigger: ${TRIGGER}
          triggered_by: ${ACTOR}
          github_run_id: ${RUN_ID}
          github_run_url: https://github.com/${REPO}/actions/runs/${RUN_ID}
          status: ${JOB_STATUS}
          date: ${DATE}
          human_approval: pending"

          ENCODED=$(echo "$CONTENT" | base64 -w 0)
          FILE_PATH="evidence/run-summaries/${DATE}-smoke-gh-${RUN_NUMBER}.yaml"

          curl -s -X PUT \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/mohit01J/prada-marketplace-quality-assurance/contents/${FILE_PATH} \
            -d "{
              \"message\": \"chore: run summary ${DATE} smoke gh-${RUN_NUMBER}\",
              \"content\": \"${ENCODED}\",
              \"branch\": \"main\"
            }"

          echo "Run summary saved: ${FILE_PATH}"
